<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consolas Clásicas 2D - Retro Center ⚡</title>
    <style>
        :root {
            --bg-general: linear-gradient(3deg, #0b0b10 0%, #000000 100%);
            --color-acento: #ff9900;
            --color-sombra: rgba(255, 153, 0, 0.3);
        }

        body {
            background: var(--bg-general); color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden; transition: background 0.5s ease;
        }

        h1 { color: var(--color-acento); margin-bottom: 5px; font-size: 28px; text-shadow: 0 0 10px var(--color-sombra); transition: color 0.3s; font-weight: 800; }
        #subtitulo { color: #ffffff; margin-bottom: 30px; font-size: 16px; opacity: 0.8; }

        /* --- BOTÓN VOLVER --- */
        #btn-volver-inicio {
            position: absolute; top: 20px; left: 20px; text-decoration: none; background: #ffffff; border: 2px solid #ffffff; 
            color: #121212; padding: 8px 15px; border-radius: 8px; font-weight: bold; box-shadow: 0 0 15px rgba(255,255,255,0.2); 
            transition: transform 0.2s; z-index: 10;
        }
        #btn-volver-inicio:hover { transform: scale(1.05); }

        /* --- MENÚ DE CONSOLAS 2D --- */
        #games-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 800px; margin-bottom: 40px; }

        .game-card {
            background: #141419; border: 2px solid #2a2a35; border-radius: 15px; width: 180px; height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.7);
        }
        .game-card:hover { transform: translateY(-10px); }
        
        .card-mame:hover { border-color: #ff0055; box-shadow: 0 15px 25px rgba(255, 0, 85, 0.4); }
        .card-snes:hover { border-color: #3b5998; box-shadow: 0 15px 25px rgba(59, 89, 152, 0.4); }
        .card-atari:hover { border-color: #ff3333; box-shadow: 0 15px 25px rgba(255, 51, 51, 0.4); }
        .card-gb:hover { border-color: #9bbc0f; box-shadow: 0 15px 25px rgba(155, 188, 15, 0.4); }
        .card-sega:hover { border-color: #00ccff; box-shadow: 0 15px 25px rgba(0, 204, 255, 0.4); }

        .game-card img { width: 100px; height: 80px; object-fit: contain; margin-bottom: 15px; filter: brightness(0) invert(1); }
        .game-card h3 { margin: 0; color: #ffffff; font-size: 16px; font-weight: 600; text-align: center; }
        .game-card span { font-size: 11px; color: #aaa; margin-top: 4px; }

        /* --- PANTALLA CARGA --- */
        #upload-screen { display: none; flex-direction: column; align-items: center; background: #161616; padding: 50px 40px 40px 40px; border: 2px dashed var(--color-acento); border-radius: 12px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-btn { background-color: var(--color-acento); color: #121212; padding: 15px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 15px var(--color-sombra); }
        .upload-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        input[type="file"] { display: none; }
        .btn-volver-carga { position: absolute; top: 12px; left: 15px; background: none; border: 1px solid var(--color-acento); color: var(--color-acento); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: bold; transition: all 0.3s ease; }
        .btn-volver-carga:hover { color: #ffffff; background-color: var(--color-acento); box-shadow: 0 0 15px var(--color-acento); }

        /* --- CONTENEDOR EMULADOR --- */
        #emulator-container { width: 854px; height: 480px; max-width: 95vw; max-height: 80vh; display: none; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); background: #000; }
    </style>
</head>
<body>

    <a href="index.html" id="btn-volver-inicio">← Volver al Inicio</a>

    <h1 id="titulo-principal">Consolas Más Míticas 🕹️</h1>
    <p id="subtitulo">Selecciona la plataforma clásica y sube tu ROM</p>

    <div id="games-menu">
        <div class="game-card card-mame" onclick="abrirCarga('arcade', '.zip', 'MAME Arcade', '#ff0055')">
            <img src="mame_logo.png" alt="MAME">
            <h3>MAME</h3>
            <span>Recreativas</span>
        </div>
        <div class="game-card card-snes" onclick="abrirCarga('snes', '.sfc,.smc', 'Super Nintendo', '#3b5998')">
            <img src="snes_logo.png" alt="SNES">
            <h3>Super Nintendo</h3>
            <span>SNES</span>
        </div>
        <div class="game-card card-atari" onclick="abrirCarga('atari', '.a26,.a78,.bin', 'Atari Clásica', '#ff3333')">
            <img src="atari_logo.png" alt="Atari">
            <h3>Todas las Atari</h3>
            <span>2600 / 7800</span>
        </div>
        <div class="game-card card-gb" onclick="abrirCarga('gameboy', '.gb,.gbc,.gba', 'Game Boy Family', '#9bbc0f')">
            <img src="gb_logo.png" alt="Game Boy">
            <h3>Game Boy (2 en 1)</h3>
            <span>GB / GBC / GBA</span>
        </div>
        <div class="game-card card-sega" onclick="abrirCarga('sega', '.md,.gen,.sms', 'Sega Clásica', '#00ccff')">
            <img src="megadrive_logo.png" alt="Sega">
            <h3>Sega (Todo en 1)</h3>
            <span>Mega Drive / Master S.</span>
        </div>
    </div>

    <div id="upload-screen">
        <button class="btn-volver-carga" onclick="volverMenu()">← Volver</button>
        <h2 id="titulo-carga" style="color: var(--color-acento); margin-top: 0;">Sube tu juego</h2>
        <p id="info-formatos" style="color: #aaaaaa; font-size: 12px; margin-bottom: 20px;">Formatos soportados: </p>
        <label class="upload-btn">Seleccionar ROM<input type="file" id="rom-selector"></label>
    </div>

    <div id="emulator-container"></div>

    <script>
        const gamesMenu = document.getElementById('games-menu');
        const uploadScreen = document.getElementById('upload-screen');
        const emuContainer = document.getElementById('emulator-container');
        const tituloPrinc = document.getElementById('titulo-principal');
        const subtitulo = document.getElementById('subtitulo');
        const btnVolverInicio = document.getElementById('btn-volver-inicio');
        const romSelector = document.getElementById('rom-selector');
        const root = document.documentElement;
        let consolaActiva = "";

        function abrirCarga(plataforma, extensiones, nombre, color) {
            consolaActiva = plataforma;
            
            // Cambiamos el color de fondo para que pegue con la consola
            root.style.setProperty('--bg-general', `linear-gradient(135deg, ${color}33 0%, #000000 100%)`);
            root.style.setProperty('--color-acento', color);
            root.style.setProperty('--color-sombra', `${color}66`);

            gamesMenu.style.display = 'none';
            btnVolverInicio.style.display = 'none';
            subtitulo.style.display = 'none';
            uploadScreen.style.display = 'flex';
            
            document.getElementById('titulo-carga').innerText = 'Cargar juego de ' + nombre;
            document.getElementById('info-formatos').innerText = 'Formatos: ' + extensiones;
            romSelector.accept = extensiones;
        }

        function volverMenu() {
            // Restauramos colores originales
            root.style.setProperty('--bg-general', 'linear-gradient(3deg, #0b0b10 0%, #000000 100%)');
            root.style.setProperty('--color-acento', '#ff9900');
            root.style.setProperty('--color-sombra', 'rgba(255, 153, 0, 0.3)');
            
            uploadScreen.style.display = 'none';
            gamesMenu.style.display = 'flex';
            subtitulo.style.display = 'block';
            btnVolverInicio.style.display = 'block';
            romSelector.value = '';
        }

        romSelector.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            uploadScreen.style.display = 'none';
            tituloPrinc.style.display = 'none';
            emuContainer.style.display = 'block';
            emuContainer.innerHTML = '<div id="game" style="width:100%; height:100%;"></div>';
            
            const tRomUrl = URL.createObjectURL(file);
            window.EJS_player = '#game';
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
            window.EJS_gameUrl = tRomUrl;
            window.EJS_startOnLoaded = true;
            
            // Asignación de los núcleos "Todo en 1" correspondientes
            if (consolaActiva === 'arcade') window.EJS_core = 'arcade';
            else if (consolaActiva === 'snes') window.EJS_core = 'snes';
            else if (consolaActiva === 'atari') window.EJS_core = 'atari2600'; // Funciona guay para Atari en general
            else if (consolaActiva === 'gameboy') window.EJS_core = 'gba'; // GBA emula GB, GBC y GBA
            else if (consolaActiva === 'sega') window.EJS_core = 'segaMD'; // segaMD emula Mega Drive y Master System
            
            const script = document.createElement('script');
            script.src = "https://cdn.emulatorjs.org/latest/data/loader.js";
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
